<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Sivil Beredskap – Evakueringsruter Agder</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="header">
    <h1>🚨 Sivil Beredskap – Evakueringsruter</h1>
    <p>Klikk på kartet eller tegn et kriseområde</p>
  </div>

  <div id="tools">
    <button id="draw-polygon-btn">✏️ Tegn kriseområdet</button>
    <button id="evac-btn">🧭 Evakueringsrute fra valgt punkt</button>

    <div id="radius-wrapper">
      <label>Radius:</label>
      <input type="range" id="radius-slider" min="0" max="100" value="50">
      <span id="radius-value">1500 m</span>
    </div>
  </div>

  <div id="map"></div>

  <div id="legend">
    <div class="legend-title">Tegnforklaring</div>
    <div class="legend-item"><span class="legend-box shelter"></span> Tilfluktsrom</div>
    <div class="legend-item"><span class="legend-box school-high"></span> Videregående skole</div>
    <div class="legend-item"><span class="legend-box school-basic"></span> Grunnskole</div>
    <div class="legend-item"><span class="legend-line route"></span> Hovedrute</div>
    <div class="legend-item"><span class="legend-circle crisis"></span> Kriseområde</div>
    <div class="legend-item"><span class="legend-line evac"></span> Evakueringsrute</div>
  </div>

  <div id="info-panel" class="hidden">
    <div id="info-content"></div>
    <button id="reset-btn">✖ Nullstill</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="main.js"></script>
</body>
</html>
