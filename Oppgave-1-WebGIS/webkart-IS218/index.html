<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Webkart</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>
  <div id="searchControls" class="map-control">
    <label for="radiusInput">Søk-radius: <span id="radiusValue">30 000</span> m</label>
    <input id="radiusInput" type="range" min="100" max="50000" step="100" value="30000" />
    <div style="margin-top:6px">
      <label><input id="adaptiveRadius" type="checkbox" /> Adaptiv radius (endre med zoom)</label>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Supabase JS (UMD) for client RPC-calls. If you provide a local
       supabase-config.js it will be loaded and used (keep that file out of Git) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>

  <!-- Optional local config (create webkart-IS218/supabase-config.js and add to .gitignore) -->
  <script src="supabase-config.js"></script>

  <script>
    // Use window.SUPABASE_CONFIG if available, otherwise fall back to placeholders.
    // Replace the placeholders below only for quick testing; prefer creating
    // a local supabase-config.js and adding it to .gitignore.
    const cfg = window.SUPABASE_CONFIG || {};
    const SUPABASE_URL = cfg.SUPABASE_URL || "https://your-project-ref.supabase.co";
    const SUPABASE_ANON_KEY = cfg.SUPABASE_ANON_KEY || "your-anon-public-key";

    try {
      window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
      console.warn("Kunne ikke opprette Supabase-klient. Sett SUPABASE_URL og SUPABASE_ANON_KEY i supabase-config.js eller i denne filen.", e);
    }
  </script>

  <script src="main.js"></script>
</body>
</html>
